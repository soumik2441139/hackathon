# Frontend Deploy Pipeline — Build standalone Next.js and deploy to Azure App Service
trigger:
  branches:
    include:
      - soumik

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build Frontend'
    jobs:
      - job: BuildAndPackage
        displayName: 'Install, Build & Zip Standalone'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20.x'

          - script: |
              cd opushire
              npm install
              echo "NEXT_PUBLIC_API_URL=https://opushire-backend.azurewebsites.net/api" > .env.production
              npm run build --if-present
              mkdir -p .next/standalone/.next/static
              cp -r .next/static/* .next/standalone/.next/static/ || true
              cp -r public .next/standalone/public/ || true
            displayName: 'Install, configure & build'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)/opushire/.next/standalone'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
              replaceExistingArchive: true
            displayName: 'Zip standalone frontend'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/frontend.zip'
              artifactName: 'frontend-app'
            displayName: 'Publish artifact'

  - stage: Deploy
    displayName: 'Deploy Frontend'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployFrontend
        displayName: 'Deploy to Azure App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: 'azure-app-service'
                    appType: 'webAppLinux'
                    appName: 'opushire-frontend-app'
                    package: '$(Pipeline.Workspace)/frontend-app/frontend.zip'
                  displayName: 'Deploy frontend to Azure'
