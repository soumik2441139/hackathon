# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - opushire-frontend-app

on:
  push:
    branches:
      - soumik
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and zip standalone
        run: |
          cd opushire
          npm install
          echo "NEXT_PUBLIC_API_URL=https://opushire-backend.azurewebsites.net/api" > .env.production
          npm run build --if-present
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/ || true
          cp -r public .next/standalone/public/ || true
          cd .next/standalone
          zip -r ../../../frontend.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: frontend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app

      - name: Unzip artifact
        run: |
          mkdir -p deploy
          unzip -o frontend.zip -d deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_914A2F1F1604447EA94FD4E943464025 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_74FA6C070D134E819954A8DE818913AE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_878262FAD14243D694B9BAC094B92841 }}

      - name: Configure Azure Web App settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'opushire-frontend-app'
          app-settings-json: |
            [
              { "name": "WEBSITE_RUN_FROM_PACKAGE", "value": "0" },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false" },
              { "name": "PORT", "value": "3000" },
              { "name": "HOSTNAME", "value": "0.0.0.0" }
            ]

      - name: Set startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set --resource-group soumik_group --name opushire-frontend-app --startup-file "node server.js"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'opushire-frontend-app'
          slot-name: 'Production'
          package: deploy
          clean: true
          restart: true