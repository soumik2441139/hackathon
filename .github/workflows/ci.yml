name: Opushire CI/CD

on:
  push:
    branches: [ "master", "soumik" ]
  pull_request:
    branches: [ "master", "soumik" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Monorepo Dependencies
      run: |
        # Wipe windows generated lockfile to allow free Linux resolution
        rm -f package-lock.json
        npm install --include=optional
      
    - name: Build Next.js Frontend
      run: npm run build -w opushire
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api

    - name: Build Express.js Backend
      run: npm run build -w opushire-backend

    - name: Run Unit Tests
      run: npx jest --selectProjects unit --ci --passWithNoTests
      working-directory: ./opushire-backend
