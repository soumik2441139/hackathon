name: Opushire CI/CD

on:
  push:
    branches: [ "master", "soumik" ]
  pull_request:
    branches: [ "master", "soumik" ]

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Build & Unit Test
  # ═══════════════════════════════════════════════════════════════
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Native Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libblas-dev liblapack-dev

    - name: Install Monorepo Dependencies
      run: npm ci --omit=optional

    - name: Install lightningcss native binary (required by Tailwind v4)
      run: npm install --no-save lightningcss-linux-x64-gnu
      working-directory: ./opushire

    - name: Build Next.js Frontend
      run: npm run build -w opushire
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api

    - name: Build Express.js Backend
      run: npx tsc -p opushire-backend/tsconfig.json

    - name: Run Unit Tests
      run: npx jest --config opushire-backend/jest.config.js --selectProjects unit --ci --passWithNoTests
      env:
        MONGODB_URI: "mongodb://unit-test-cluster:27017/test"
        JWT_SECRET: "test-environment-secret-jwt-token"
        GEMINI_API_KEY: "dummy-gemini-key"
        GROQ_API_KEY: "dummy-groq-key"
        OPENROUTER_API_KEY: "dummy-openrouter-key"

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Playwright E2E Tests
  # ═══════════════════════════════════════════════════════════════
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install Native Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libblas-dev liblapack-dev

    - name: Install Monorepo Dependencies
      run: npm ci --omit=optional

    - name: Install lightningcss native binary (required by Tailwind v4)
      run: npm install --no-save lightningcss-linux-x64-gnu
      working-directory: ./opushire

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: ./opushire

    - name: Build Frontend for E2E
      run: npm run build -w opushire
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api

    - name: Build Backend for E2E
      run: npx tsc -p opushire-backend/tsconfig.json

    - name: Start Backend Server
      run: |
        cd opushire-backend
        node dist/server.js &
        sleep 10
      env:
        PORT: 5000
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_HOST: localhost
        JWT_SECRET: ci-test-jwt-secret

    - name: Run Playwright E2E Tests
      run: npx playwright test --reporter=github
      working-directory: ./opushire
      env:
        CI: true
        PLAYWRIGHT_BASE_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
        NEXTAUTH_URL: http://localhost:3000
        NEXTAUTH_SECRET: ci-test-secret-minimum-32-chars-long
        MONGODB_URI: mongodb://localhost:27017/test
        JWT_SECRET: ci-test-jwt-secret

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: opushire/playwright-report/
        retention-days: 14

  # ═══════════════════════════════════════════════════════════════
  #  Job 3: Load Test Chaos Gate (k6)
  #  FAILS the pipeline if P95 > 2000ms or error rate > 5%
  # ═══════════════════════════════════════════════════════════════
  load-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install Native Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libblas-dev liblapack-dev

    - name: Install Dependencies
      run: npm ci --omit=optional

    - name: Build Backend
      run: npx tsc -p opushire-backend/tsconfig.json

    - name: Start Backend Server
      run: |
        cd opushire-backend
        node dist/server.js &
        sleep 10
      env:
        PORT: 5000
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/opushire-loadtest
        REDIS_HOST: localhost
        JWT_SECRET: loadtest-secret

    - name: Install k6
      run: |
        curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -L | tar xvz
        sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/

    - name: Run k6 Load Test (Chaos Gate)
      run: |
        k6 run opushire-backend/loadtest/api.loadtest.js \
          --out json=loadtest-results.json \
          --env API_URL=http://localhost:5000
      # k6 exits with non-zero if thresholds are breached — this FAILS the pipeline

    - name: Upload Load Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: loadtest-results
        path: loadtest-results.json
        retention-days: 14
