# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - opushire-backend

on:
  push:
    branches:
      - soumik
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: npm install, build, and zip
        run: |
          cd opushire-backend
          # Use npm ci for clean, predictable installation in CI
          npm ci
          
          # Force rebuild of native modules for the Linux runner platform
          npm rebuild
          
          npm run build --if-present
          
          # Remove dev dependencies and reinstall production deps standalone
          # This ensures we don't carry Windows binaries or unnecessary dev tools to Azure
          rm -rf node_modules
          npm install --omit=dev --no-workspaces --install-links
          
          # Final sanity check rebuild for production-only dependencies
          npm rebuild
          
          # Bundle purely the backend orchestrator (bots are now native BullMQ workers inside src/services/queue)
          zip -r ../backend.zip .


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_83511DD744684A57BBAB182D97AEA6B3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D7222125D0DB42B6A3AC525FC6C31A46 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_302D087BC7084C759DEC19A3DA526C08 }}

      - name: Configure Azure Web App settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'opushire-backend'
          app-settings-json: |
            [
              { "name": "WEBSITE_RUN_FROM_PACKAGE", "value": "1" },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false" }
            ]
          general-settings-json: |
            {
              "appCommandLine": "node dist/server.js"
            }

      - name: Wait for SCM restart stabilization
        run: sleep 30

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'opushire-backend'
          slot-name: 'Production'
          package: backend.zip
          restart: true