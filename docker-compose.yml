version: '3.8'

services:
  # 1. Reverse Proxy (API Gateway)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  # 2. Next.js App
  frontend:
    build:
      context: ./opushire
      dockerfile: Dockerfile
    env_file:
      - ./opushire/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    expose:
      - "3000"

  # 3. Express API (No more Bot Spawning!)
  backend:
    build:
      context: ./opushire-backend
      dockerfile: Dockerfile
    env_file:
      - ./opushire-backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/opushire
      - REDIS_HOST=redis-primary
      - SECONDARY_REDIS_HOST=redis-secondary
      - TERTIARY_REDIS_URL=redis://redis-tertiary:6379
      - VECTOR_DB_URL=http://qdrant:6333
      - STORAGE_URL=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
    expose:
      - "5000"
    depends_on:
      - mongo
      - redis-primary
      - minio
      - qdrant

  # 4. Core Database
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 5, 6, 7. Triple Redis Architecture
  redis-primary:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 50mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
  
  redis-secondary:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 30mb --maxmemory-policy volatile-lru
    ports:
      - "6380:6379"

  redis-tertiary:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 20mb --maxmemory-policy volatile-lru
    ports:
      - "6381:6379"

  # 8. Local Object Storage (Zero Cost S3/AzureBlob Alternative)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data

  # 9. Free-Tier Vector Database
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  minio_data:
  qdrant_data:
