# CI Pipeline — Build validation for frontend + backend
trigger:
  branches:
    include:
      - soumik
      - master

pr:
  branches:
    include:
      - soumik
      - master

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build Validation'
    jobs:
      - job: BuildFrontend
        displayName: 'Build Frontend (Next.js)'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20.x'

          - script: |
              cd opushire
              npm ci || npm install
            displayName: 'Install frontend dependencies'

          - script: |
              cd opushire
              npm run build
            displayName: 'Build Next.js'
            env:
              NEXT_PUBLIC_API_URL: 'http://localhost:5000/api'

      - job: BuildBackend
        displayName: 'Build Backend (Express)'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20.x'

          - script: |
              cd opushire-backend
              npm ci || npm install
            displayName: 'Install backend dependencies'

          - script: |
              cd opushire-backend
              npm run build
            displayName: 'Build Express.js app'
